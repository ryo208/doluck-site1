<div class="page-header">
  <div class="container">
    <h1>お問い合わせ</h1>
    <p>ご予約・ご質問はこちらのフォーム、またはお電話にて</p>
  </div>
</div>

<section class="block container">
  <div class="two-col">
    <div>
      <form name="contact" method="POST" action="/thanks.html" data-netlify="true" data-netlify-honeypot="bot-field" class="contact-form">
        <input type="hidden" name="form-name" value="contact">
        <p class="hidden-field">
          <label>この項目は入力しないでください<input name="bot-field"></label>
        </p>

        <label for="name">お名前<span class="required">必須</span></label>
        <input type="text" id="name" name="name" required>

        <label for="email">メールアドレス<span class="required">必須</span></label>
        <input type="email" id="email" name="email" required>

        <label for="subject">お問い合わせ種別</label>
        <select id="subject" name="subject">
          <option value="旅宿の予約について">旅宿の予約について</option>
          <option value="喫茶について">喫茶について</option>
          <option value="その他">その他</option>
        </select>

        <label for="message">お問い合わせ内容<span class="required">必須</span></label>
        <textarea id="message" name="message" rows="6" required></textarea>

        <button type="submit" class="btn btn-primary">送信する</button>
      </form>
    </div>

    <div>
      <div class="note-box">
        <strong>お急ぎの場合はお電話ください</strong><br>
        TEL: <a href="tel:0155724949">015-572-4949</a><br>
        喫茶営業時間 10:00〜18:00（火曜定休）
      </div>
      <table class="detail-table">
        <tr><th>住所</th><td>〒083-0034<br>北海道中川郡池田町利別本町2-6</td></tr>
      </table>
    </div>
  </div>
</section>
